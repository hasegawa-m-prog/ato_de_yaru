<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー集計 - あとでやる</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif JP', serif;
            background: #111;
            color: #f5f0e8;
            min-height: 100vh;
            padding: 32px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: rgba(26,20,16,0.92);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 16px 60px rgba(0,0,0,0.3);
        }
        .title {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #f5f0e8;
        }
        .subtitle {
            color: rgba(245,240,232,0.6);
            margin-bottom: 24px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #c9a84c;
            text-decoration: none;
            border-bottom: 1px solid rgba(201,168,76,0.25);
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        th {
            color: #c9a84c;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
        }
        td {
            color: rgba(245,240,232,0.82);
        }
        .empty-state {
            color: rgba(245,240,232,0.58);
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'task_list' %}" class="back-link">← タスク一覧に戻る</a>
        <div class="card">
            <h1 class="title">ユーザー集計</h1>
            <p class="subtitle">各ユーザーのタスク状況を確認できます。</p>
            {% if users %}
                <table>
                    <thead>
                        <tr>
                            <th>ユーザー名</th>
                            <th>合計タスク</th>
                            <th>未完了</th>
                            <th>完了済み</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user.username }}</td>
                            <td>{{ user.total_tasks }}</td>
                            <td>{{ user.pending_tasks }}</td>
                            <td>{{ user.done_tasks }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <p class="empty-state">まだユーザー情報がありません。</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
